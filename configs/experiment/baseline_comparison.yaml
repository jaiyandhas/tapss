# ============================================================
# Baseline Comparison Experiment
# Runs all methods on the same CL task sequence
# ============================================================

defaults:
  - /default
  - _self_

experiment:
  name: "baseline_comparison"
  seed: 42
  output_dir: "outputs/baseline_comparison"

model:
  name: "distilbert-base-uncased"
  type: "sequence_classification"
  max_length: 128

continual_learning:
  task_a_dataset: "ag_news"
  task_b_dataset: "sst2"
  evaluate_after_task_b: true

training:
  num_epochs: 3
  batch_size: 16
  learning_rate: 2.0e-4

comparison:
  baselines:
    - "vanilla_lora"
    - "naive_finetuning"
    - "ewc"
    - "random_protection"
    - "tapss"

# TAPSS config used for the tapss baseline
saliency:
  method: "tapss"
  weights:
    gradient: 0.40
    perturbation: 0.30
    activation: 0.20
    layer_contribution: 0.10

protection:
  policy: "freeze_topk"
  topk_percent: 20.0

lora:
  r: 8
  lora_alpha: 16
